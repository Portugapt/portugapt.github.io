{# Blog index: list of posts. Loaded both as a full page and as an htmx
   fragment, so it must contain no <style>/<script> of its own (those would be
   re-injected on every swap). Sharing is handled by a single delegated
   listener in body.html; styles live in resources/common.css. #}
<ul class="space-y-2 overflow-y-auto post-list">
  {% for post in posts %}
    {% include 'sections/blog/_index_post.html' %}
  {% endfor %}
</ul>
