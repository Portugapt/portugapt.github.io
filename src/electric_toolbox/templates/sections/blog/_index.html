{# Blog index. Loaded both as a full page and as an htmx fragment, so it carries
   no <style>/<script> of its own. The tag filter swaps only #post-list with a
   pre-rendered, statically-generated fragment (query-param sub-partials). #}
{% if tags %}
<nav class="flex flex-wrap gap-2 mb-4" aria-label="Filter posts by tag">
  <button class="px-3 py-1 text-sm rounded-full bg-outp/40 dark:bg-douts/30 hover:bg-outp/70 dark:hover:bg-douts/60"
      hx-get="{{ all_hx_get }}" hx-push-url="{{ all_push_url }}"
      hx-target="#post-list" hx-swap="innerHTML">
    All
  </button>
  {% for tag in tags %}
  <button class="px-3 py-1 text-sm rounded-full bg-outp/40 dark:bg-douts/30 hover:bg-outp/70 dark:hover:bg-douts/60"
      hx-get="{{ tag.hx_get }}" hx-push-url="{{ tag.push_url }}"
      hx-target="#post-list" hx-swap="innerHTML">
    {{ tag.name }} <span class="text-gray-600 dark:text-gray-400">({{ tag.count }})</span>
  </button>
  {% endfor %}
</nav>
{% endif %}

<ul id="post-list" class="space-y-2 overflow-y-auto post-list">
  {% include 'sections/blog/_post_items.html' %}
</ul>
