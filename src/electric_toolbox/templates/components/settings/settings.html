{# templates/navbar/settings.html #}
<div x-data="{ openModal: false }" @modal-settings-feedback.window="openModal = $event.detail">
    <div class="hidden sm:flex">
        {% include 'components/settings/_options.html' %}
    </div>

    <div class="flex sm:hidden">
        <button @click="$dispatch('modal-settings-toggle', !openModal); openModal = !openModal"
            aria-label="Open settings" class="inline-flex items-center justify-center">
            {{ icons.settings | safe }}
        </button>
    </div>
</div>
