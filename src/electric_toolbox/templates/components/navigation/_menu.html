{# Section navigation. Plain anchors (crawlable, work without JS); hx-boost on
   <body> turns them into in-place #body-content swaps. Used both inline on
   desktop and inside the mobile slide-down panel. #}
<ul class="flex flex-col text-base font-medium sm:flex-row sm:items-center sm:text-sm sm:space-x-2">
    {% for section in navigation.sections %}
    <li>
        <a href="{{ section.path }}"
            {% if section.active %}aria-current="page"{% endif %}
            class="block px-3 py-3 rounded-md text-outtext dark:text-douttext hover:bg-outone/60 dark:hover:bg-doutone/60 aria-[current=page]:text-outa dark:aria-[current=page]:text-douttext aria-[current=page]:font-semibold sm:py-1.5">
            {{ section.title }}
        </a>
    </li>
    {% endfor %}
</ul>
