experiences:
    title: Experiences
    info:
      - role: Consultant I
        time: 2022 - Present
        company: |
          [Closer Consulting](https://www.closer.pt/), Lisbon
        details: |
          I began my journey at Closer through their Academy program, where I was introduced to a variety of 
          data tools and methods. During my time in the Academy, I gained hands-on experience using powerful BI 
          tools like PowerBI and SQLServer, as well as essential Data Science tools like sklearn and pandas. 
          Additionally, I was introduced to some cloud tools in GCP and relearned statistical methods and 
          data visualization tools.
          
          As a member of the DevOps team at Closer, I am currently working on a project that is founded in Google Cloud Platform. 
          My day-to-day responsibilities involve developing serverless applications using Cloud Functions and Cloud Run in Python, 
          with a focus on implementing new features and creating automation tests. In addition, I am responsible for managing parts 
          of the infrastructure-as-code using Pulumi, including Cloud Build Triggers, Bigquery Tables, and Cloud 
          Run Deployments, and maintaining cloudbuild pipelines.
          
          One of the biggest challenges I have faced in this role is ensuring that our development processes are 
          reliable, observable with logs and traces, and adhere to best practices for software development. I am proud of the progress 
          our team has made in this area and am excited to continue contributing to the success of our project.

          The stack of tools I use the are the following:  
          Python (unittest2, opentelemetry, GCP SDK's), Cloud Functions, Cloud Run, Cloud Build, Bigquery, Firestore, Pub/Sub, 
          Cloud Trace, Cloud Logging.

      - role: Data Analyst Trainee
        time: 2020 - 2021
        company: Tranquilidade, Lisbon
        details: |
          During my first career experience as a trainee, I learned important aspects of effective communication with colleagues, 
          task prioritization, and gained insight into the business aspects of our work. As a Data Analyst, I utilized SQL 
          for data retrieval and R for data analysis to determine the conversion rates of leads. 
          
          I also gained experience in data cleaning and wrangling, which was crucial in building a classification model 
          using sklearn and xgboost in Python. As part of the project, I conducted an initial analysis to determine the 
          feasibility of the model's quality.

