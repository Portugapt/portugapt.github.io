career-profile:
    title: Career Profile
    summary: |
      My journey in the world of technology began in the field of Data Science, where I honed my skills in data extraction, 
      wrangling, and model development. However, I soon realized that I needed to learn more about developing high-quality 
      code that adheres to industry standards. This led me to pivot towards DevOps, where I now focus on developing software 
      that meets higher standards of quality and fosters a culture of discipline. My ultimate goal is to pursue a career in MLOps, 
      leveraging my expertise in both DevOps and Data Science to develop cutting-edge machine learning models that meet the highest 
      standards of quality and reliability.
